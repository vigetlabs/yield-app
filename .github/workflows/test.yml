name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands —
# we only care about the latest result per branch / PR.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  xcodebuild-test:
    name: Build & test
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stub Secrets.xcconfig
        # The real Secrets.xcconfig holds Harvest OAuth credentials and
        # isn't checked in (.gitignore'd). Tests don't exercise OAuth,
        # so empty values are fine — but xcodegen will fail spec
        # validation if the file is missing entirely.
        run: |
          cat > Secrets.xcconfig <<'EOF'
          HARVEST_CLIENT_ID = ci-stub
          HARVEST_CLIENT_SECRET = ci-stub
          EOF

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build & test
        # `test` builds the host app, builds the test bundle, and
        # runs every test in the YieldTests target. Disable code
        # signing on CI — the runner has no developer cert and the
        # tests don't need a signed binary to execute.
        run: |
          set -o pipefail
          xcodebuild test \
            -project Yield.xcodeproj \
            -scheme Yield \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO
