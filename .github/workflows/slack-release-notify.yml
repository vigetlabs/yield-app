name: Notify Slack on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Convert GitHub markdown to Slack mrkdwn:
          #   ## / ### headings → *bold* with blank line before
          #   **bold** → *bold*
          #   - bullets → •  bullets
          SLACK_BODY=$(echo "$RELEASE_BODY" \
            | sed 's/^### \(.*\)/\n*\1*/g' \
            | sed 's/^## \(.*\)/\n*\1*/g' \
            | sed 's/\*\*\([^*]*\)\*\*/\*\1\*/g' \
            | sed 's/^- /•  /g')

          # Build Block Kit payload for reliable mrkdwn rendering
          jq -n \
            --arg title "*Yield ${RELEASE_TAG} released*" \
            --arg body "$SLACK_BODY" \
            --arg link "<${RELEASE_URL}|View release on GitHub>" \
            '{
              blocks: [
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $title
                  }
                },
                {
                  type: "section",
                  text: {
                    type: "mrkdwn",
                    text: $body
                  }
                },
                {
                  type: "context",
                  elements: [
                    {
                      type: "mrkdwn",
                      text: $link
                    }
                  ]
                }
              ],
              text: ($title + "\n\n" + $body)
            }' \
          | curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d @-
