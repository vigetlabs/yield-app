name: Notify Slack on Release

on:
  release:
    types: [published]

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_BODY: ${{ github.event.release.body }}
        run: |
          # Convert GitHub markdown to Slack mrkdwn:
          #   **bold** → *bold*
          #   ## headings → *headings*
          #   - bullets stay as-is
          SLACK_BODY=$(echo "$RELEASE_BODY" \
            | sed 's/^## \(.*\)/*\1*/g' \
            | sed 's/\*\*\([^*]*\)\*\*/\*\1\*/g')

          # Build the payload with proper newlines using jq
          jq -n \
            --arg title "*Yield ${RELEASE_TAG} released*" \
            --arg body "$SLACK_BODY" \
            --arg link "<${RELEASE_URL}|View release on GitHub>" \
            '{text: ($title + "\n\n" + $body + "\n\n" + $link)}' \
          | curl -X POST "$SLACK_WEBHOOK_URL" \
              -H 'Content-type: application/json' \
              -d @-
