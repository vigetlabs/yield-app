name: Yield
options:
  bundleIdPrefix: com.jeremyfields
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.38"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  Yield:
    type: application
    platform: macOS
    sources:
      - Yield
    dependencies:
      - package: Sparkle
        product: Sparkle
    info:
      path: Yield/Info.plist
      properties:
        LSUIElement: true
        CFBundleDisplayName: "Yield"
        CFBundleName: Yield
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
          NSAllowsLocalNetworking: true
        SUFeedURL: "https://raw.githubusercontent.com/jeremyfields/yield-app/main/appcast.xml"
        SUPublicEDKey: "qf90v1Zbq7OTVAfWHnhjzHEkvnW4juPWIgjbm/3U/P8="
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.yield
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        PRODUCT_NAME: "Yield"
        MARKETING_VERSION: "0.9.0"
        CURRENT_PROJECT_VERSION: "1"
        ENABLE_HARDENED_RUNTIME: true
        CODE_SIGN_IDENTITY: "Apple Development: jeremyfields@me.com (64R6HQKBHY)"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_ENTITLEMENTS: Yield/Yield.entitlements
